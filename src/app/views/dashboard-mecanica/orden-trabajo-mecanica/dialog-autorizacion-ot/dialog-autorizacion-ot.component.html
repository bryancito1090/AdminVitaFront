<div class="p-4">
  <p class="text-base mb-4">{{ mensaje }}</p>

  <div class="flex justify-end mt-6 gap-2">
    <button 
      pButton 
      label="Cerrar" 
      class="p-button-secondary" 
      (click)="cerrar()">
    </button>

    <button 
      *ngIf="estado == 7 || estado == 8" 
      pButton 
      label="Autorizar" 
      class="p-button-success" 
      (click)="autorizar()">
    </button>
  </div>
</div>
