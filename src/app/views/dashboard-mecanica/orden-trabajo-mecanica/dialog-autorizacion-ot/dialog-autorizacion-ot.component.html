<div class="p-4">
  <p class="text-base mb-4">{{ mensaje }}</p>

  <div class="flex justify-end mt-6 gap-2">
    <p-button 
      label="Cerrar" 
      severity="secondary"
      (click)="cerrar()">
    </p-button>

    <p-button 
      *ngIf="estado == 8" 
      label="Autorizar" 
      (click)="autorizar()">
    </p-button>
  </div>
</div>
