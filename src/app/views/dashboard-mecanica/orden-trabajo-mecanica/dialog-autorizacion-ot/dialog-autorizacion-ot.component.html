<div class="p-4 flex flex-col gap-4">
  <div class="flex items-center gap-2">
    <p-tag [value]="estadoLabel" [severity]="estadoColor"></p-tag>
    <span class="text-sm text-gray-600">Tarea OT: {{ idTareaOt }}</span>
  </div>

  <p class="text-sm text-gray-800 leading-6">{{ mensaje }}</p>

  <div *ngIf="duracion" class="flex items-center gap-2 text-sm text-gray-600">
    <i class="pi pi-clock text-gray-500"></i>
    <span>Duracion estimada: {{ duracion }} unidades</span>
  </div>

  <div class="flex justify-end mt-6 gap-2">
    <p-button 
      label="Cerrar" 
      severity="secondary"
      (click)="cerrar()">
    </p-button>

    <p-button 
      *ngIf="mostrarBotonAutorizar" 
      label="Autorizar" 
      icon="pi pi-check"
      (click)="autorizar()">
    </p-button>
  </div>
</div>
