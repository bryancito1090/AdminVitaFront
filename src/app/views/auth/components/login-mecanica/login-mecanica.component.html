<div id="bg-principal" >
    <div class="relative min-h-screen bg-indigo-900 bg-opacity-50">
      <div class="contenedor-main min-h-screen min-w-[100vw] bg-slate-900 bg-opacity-60">
        <div class="contenedor-form my-auto self-center bg-white p-4"> <!--Contenedor blanco-->
            <div class="containter-portal shadow-md">
                <div class="text-center py-4">
                <p class="font-serif text-xs font-thin tracking-wide mb-2 text-white">PORTAL MECANICA VITA</p>
                <div class="flex justify-center">
                    <img class="max-w-36" src="assets/img/LOGO-VARIACIoN-1.png" alt="istpet_logo">
                </div>
                </div>
            </div>

            <form (ngSubmit)="onSubmit()" class="flex flex-col items-center px-6 pb-6">
            <p class="text-gray-500 mb-6">
                Por favor ingresa tu código de acceso para Ingresar al Sistema de Mecánica.
            </p>

            <p-inputotp 
                name="codigo"
                [(ngModel)]="value"
                [mask]="true"
                [integerOnly]="true"
                size="large"
                [length]="4"
                inputStyleClass="no-autofill"
                autocomplete="off"
                (keydown.enter)="onSubmit()"
                >
            </p-inputotp>

            <div class="flex items-center gap-4 mt-6">
              
                <button type="submit" class="bg-primary-600 text-white px-4 py-2 rounded">
                  <ng-container *ngIf="!spinnerVisible;">
                    Ingresar
                  </ng-container>
                  <p-progress-spinner *ngIf="spinnerVisible" strokeWidth="8" fill="transparent" animationDuration=".5s" [style]="{ width: '18px', height: '18px' }" />
                </button>
            </div>
            </form>

      </div>
      <div class="self-center pb-4">
        <a class="uppercase" style="font-size: 10px;" href="https://institutotraversari.edu.ec/" target="_blank"> ©2025 Instituto Superior Tecnológico Mayor Pedro Traversari</a>
      </div>
    </div>
  </div>
